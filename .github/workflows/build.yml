name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      # Only ProxiMeeting key in the agent — tap updates use TAP_DEPLOY_KEY via GIT_SSH_COMMAND (see Update Homebrew tap cask).
      - name: Setup SSH deploy key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Trust GitHub host key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Use SSH for pushes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: git remote set-url origin "git@github.com:${{ github.repository }}.git"

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >>
          $GITHUB_OUTPUT

      - name: Sync Info.plist version from package.json
        id: sync-info-plist-version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.value }}" ProxiMeeting/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.value }}" ProxiMeeting/Info.plist
          # Use git diff inside `if` so a non-zero exit (file changed) does not fail the step under bash -e
          if git diff --quiet ProxiMeeting/Info.plist; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Amend HEAD with synced Info.plist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          steps.sync-info-plist-version.outputs.changed == 'true'
        run: |
          git config user.name "dytsou"
          git config user.email "dytsou@gmail.com"
          git add ProxiMeeting/Info.plist
          git commit --amend --no-edit
          git push --force-with-lease origin "HEAD:${{ github.ref_name }}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.value }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: make build

      - name: Zip app
        run: zip -r ProxiMeeting.zip ProxiMeeting.app

      - name: SHA256 of ProxiMeeting.zip
        id: artifact
        run: echo "sha256=$(shasum -a 256 ProxiMeeting.zip | awk '{print $1}')" >>
          $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ProxiMeeting-${{ steps.version.outputs.value }}.zip
          path: ProxiMeeting.zip

      - name: Create tag
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.value }}
          git push origin v${{ steps.version.outputs.value }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.value }}
          files: ProxiMeeting.zip
          generate_release_notes: true
          append_body: true
          body: |
            ## Upgrade with Homebrew

            ```bash
            brew upgrade --cask proximeeting
            ```

            ### Troubleshooting

            ```bash
            brew update
            brew upgrade --cask proximeeting --verbose
            brew reinstall --cask proximeeting
            brew doctor
            ```

      # TAP_DEPLOY_KEY must be the private key whose public key is a write-enabled Deploy key on dytsou/homebrew-proximeeting only.
      # Use GIT_SSH_COMMAND so Git does not pick DEPLOY_KEY from the agent (wrong repo → "denied to deploy key").
      - name: Update Homebrew tap cask
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.value }}
          SHA256: ${{ steps.artifact.outputs.sha256 }}
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY:-}" ]; then
            echo "::error::Secret TAP_DEPLOY_KEY is not set (add the homebrew-proximeeting deploy key private key)."
            exit 1
          fi
          keyfile=$(mktemp)
          trap 'rm -f "$keyfile"' EXIT
          umask 077
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$keyfile"
          export GIT_SSH_COMMAND="ssh -i ${keyfile} -o IdentitiesOnly=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts"
          tmp=$(mktemp -d)
          git clone --depth 1 git@github.com:dytsou/homebrew-proximeeting.git "$tmp/tap"
          cask="$tmp/tap/Casks/proximeeting.rb"
          perl -pi -e 's/^  version ".*"/  version "$ENV{VERSION}"/' "$cask"
          perl -pi -e 's/^  sha256 ".*"/  sha256 "$ENV{SHA256}"/' "$cask"
          cd "$tmp/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/proximeeting.rb
          if git diff --staged --quiet; then
            echo "No cask file changes; skipping commit."
            exit 0
          fi
          git commit -m "chore: bump ProxiMeeting cask to ${VERSION}"
          git push origin HEAD:main
