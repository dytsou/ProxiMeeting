name: Update copyright year

on:
  schedule:
    # January 1, 00:00 UTC
    - cron: "0 0 1 1 *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-copyright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup SSH deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Trust GitHub host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Use SSH for pushes
        run: git remote set-url origin "git@github.com:${{ github.repository }}.git"

      - name: Bump copyright year
        run: |
          export YEAR="$(date -u +%Y)"
          echo "YEAR=$YEAR" >> "$GITHUB_ENV"
          perl -pi -e 's/Copyright \(c\) \d{4}/Copyright (c) $ENV{YEAR}/' LICENSE
          for f in \
            ProxiMeeting/Info.plist \
            ProxiMeeting/en.lproj/Localizable.strings \
            ProxiMeeting/en.lproj/InfoPlist.strings \
            ProxiMeeting/zh-Hant.lproj/Localizable.strings \
            ProxiMeeting/zh-Hant.lproj/InfoPlist.strings
          do
            perl -pi -e 's/Copyright © \d{4}/Copyright © $ENV{YEAR}/' "$f"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LICENSE ProxiMeeting/Info.plist \
            ProxiMeeting/en.lproj/Localizable.strings \
            ProxiMeeting/en.lproj/InfoPlist.strings \
            ProxiMeeting/zh-Hant.lproj/Localizable.strings \
            ProxiMeeting/zh-Hant.lproj/InfoPlist.strings
          if git diff --staged --quiet; then
            echo "Copyright year already set to ${YEAR}; nothing to commit."
          else
            git commit -m "chore: update copyright year to ${YEAR}"
            git push
          fi
